{% extends "core/base.html" %}

{% block title %}Checkout Depósito - FastPass UFFS{% endblock %}

{% block content %}
<div class="row justify-content-center my-4 animate__animated animate__fadeIn">
    <div class="col-12 col-md-8 col-lg-6">
        <div class="card card-uffs p-4">
            
            <div class="d-flex align-items-center justify-content-between mb-4 pb-2 border-bottom border-secondary border-opacity-15">
                <h3 class="fw-bold mb-0" style="color: var(--uffs-yellow-accent);">
                    <i class="fa-solid fa-qrcode me-1"></i> Pagamento PIX
                </h3>
                <span class="badge badge-credit px-2 py-1 rounded-pill">Pendente</span>
            </div>

            <div class="text-center mb-4">
                <div class="text-muted fs-7 text-uppercase tracking-wider">Valor do Depósito</div>
                <div class="fw-bold fs-1 text-success">R$ {{ deposito.valor }}</div>
            </div>

            <!-- QR Code Box -->
            <div class="text-center mb-4">
                <div class="d-inline-block p-3 bg-white rounded-3 mb-2 shadow">
                    <img src="{{ payment.qr_code_image_url }}" alt="QR Code PIX" style="width: 200px; height: 200px;">
                </div>
                <div class="text-muted fs-7">Escaneie o código com o app do seu banco</div>
            </div>

            <!-- Botão de redirecionamento Abacate Pay -->
            <div class="mb-4">
                <a href="{{ payment.payment_url }}" target="_blank" class="btn btn-success btn-lg w-100 fw-bold py-2 shadow-sm fs-6 text-white" style="background-color: #10B981; border-color: #10B981;">
                    <i class="fa-solid fa-external-link me-1"></i> Pagar com Abacate Pay
                </a>
            </div>

            <!-- Copia e Cola -->
            <div class="mb-4">
                <label class="form-label fw-semibold text-muted fs-7">Link de Pagamento / Checkout</label>
                <div class="input-group">
                    <input type="text" id="pixCode" class="form-control form-control-uffs fs-7" value="{{ payment.qr_code_copy_paste }}" readonly>
                    <button class="btn btn-uffs-accent" type="button" onclick="copyPixCode()">
                        <i class="fa-solid fa-copy"></i> Copiar Link
                    </button>
                </div>
            </div>



            <div class="text-center mt-4">
                <a href="{% url 'student_dashboard' %}" class="text-decoration-none text-muted fs-7">
                    <i class="fa-solid fa-arrow-left me-1"></i> Voltar à carteira
                </a>
            </div>

        </div>
    </div>
</div>

<script>
    function copyPixCode() {
        var copyText = document.getElementById("pixCode");
        copyText.select();
        copyText.setSelectionRange(0, 99999); // For mobile devices
        
        navigator.clipboard.writeText(copyText.value).then(function() {
            alert("Código PIX copiado para a área de transferência!");
        }, function() {
            alert("Erro ao copiar o código. Por favor, copie manualmente.");
        });
    }
</script>
{% endblock %}

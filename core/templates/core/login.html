{% extends "core/base.html" %}

{% block title %}Entrar - FastPass UFFS{% endblock %}

{% block content %}
<div class="row justify-content-center my-5 animate__animated animate__fadeIn">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5">
        <div class="card card-uffs p-4 p-md-5">
            <h2 class="text-center fw-bold mb-2" style="color: var(--uffs-yellow-accent);">Bem-vindo de volta</h2>
            <p class="text-center text-muted mb-4 fs-6">Acesse sua carteira e gerencie suas entradas</p>
            
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="id_username">E-mail</label>
                    <input type="email" name="username" id="id_username" class="form-control form-control-uffs" placeholder="exemplo@email.com" required autocomplete="email">
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-semibold" for="id_password">Senha</label>
                    <input type="password" name="password" id="id_password" class="form-control form-control-uffs" placeholder="••••••••" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-uffs-primary w-100 py-2 fs-6 mt-2">
                    Entrar <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                </button>
            </form>
            
            <div class="text-center mt-4 text-muted fs-7">
                Não tem uma conta? <a href="{% url 'register' %}" class="text-decoration-none fw-semibold" style="color: var(--uffs-green-light);">Criar conta</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
